<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据加载测试</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .test-section { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .success { background: #d4edda; border-color: #c3e6cb; }
        .error { background: #f8d7da; border-color: #f5c6cb; }
        h2 { margin-top: 0; }
        pre { background: #f4f4f4; padding: 10px; overflow: auto; }
    </style>
</head>
<body>
    <h1>数据加载测试报告</h1>
    
    <div id="results"></div>
    
    <script src="data/categories.js"></script>
    <script src="data/architecture.js"></script>
    <script src="data/programming.js"></script>
    <script src="data/database.js"></script>
    <script src="data/frontend.js"></script>
    <script src="data/backend.js"></script>
    <script src="data/data-analysis.js"></script>
    <script src="data/index.js"></script>
    
    <script>
        const results = document.getElementById('results');
        
        function addResult(title, success, details) {
            const div = document.createElement('div');
            div.className = 'test-section ' + (success ? 'success' : 'error');
            div.innerHTML = `
                <h2>${success ? '✅' : '❌'} ${title}</h2>
                <pre>${JSON.stringify(details, null, 2)}</pre>
            `;
            results.appendChild(div);
        }
        
        // 测试 1: 检查 categories 数据
        addResult(
            'Categories 数据',
            window.categories && window.categories.length > 0,
            {
                count: window.categories ? window.categories.length : 0,
                ids: window.categories ? window.categories.map(c => c.id) : []
            }
        );
        
        // 测试 2: 检查各模块数据
        const modules = {
            architecture: window.architectureKnowledge,
            programming: window.programmingKnowledge,
            database: window.databaseKnowledge,
            frontend: window.frontendKnowledge,
            backend: window.backendKnowledge,
            dataAnalysis: window.dataAnalysisKnowledge
        };
        
        const moduleResults = {};
        for (const [name, data] of Object.entries(modules)) {
            moduleResults[name] = data ? data.length : 0;
        }
        
        addResult(
            '各模块数据',
            Object.values(moduleResults).every(count => count > 0),
            moduleResults
        );
        
        // 测试 3: 检查 knowledgeData 聚合
        addResult(
            'knowledgeData 聚合',
            window.knowledgeData && 
            window.knowledgeData.categories && 
            window.knowledgeData.knowledge &&
            window.knowledgeData.categories.length > 0 &&
            window.knowledgeData.knowledge.length > 0,
            {
                categoriesCount: window.knowledgeData ? window.knowledgeData.categories.length : 0,
                knowledgeCount: window.knowledgeData ? window.knowledgeData.knowledge.length : 0,
                categoryIds: window.knowledgeData ? window.knowledgeData.categories.map(c => c.id) : [],
                knowledgeIds: window.knowledgeData ? window.knowledgeData.knowledge.slice(0, 5).map(k => k.id) : []
            }
        );
        
        // 测试 4: 检查 categoryId 匹配
        if (window.knowledgeData && window.knowledgeData.knowledge) {
            const categoryIds = window.knowledgeData.categories.map(c => c.id);
            const knowledgeCategoryIds = [...new Set(window.knowledgeData.knowledge.map(k => k.categoryId))];
            const unmatchedIds = knowledgeCategoryIds.filter(id => !categoryIds.includes(id));
            
            addResult(
                'categoryId 匹配检查',
                unmatchedIds.length === 0,
                {
                    categoryIds: categoryIds,
                    knowledgeCategoryIds: knowledgeCategoryIds,
                    unmatchedIds: unmatchedIds
                }
            );
        }
        
        // 测试 5: 检查知识点数据结构
        if (window.knowledgeData && window.knowledgeData.knowledge && window.knowledgeData.knowledge.length > 0) {
            const sample = window.knowledgeData.knowledge[0];
            addResult(
                '知识点数据结构',
                sample.id && sample.categoryId && sample.title && sample.summary && sample.content,
                {
                    hasId: !!sample.id,
                    hasCategoryId: !!sample.categoryId,
                    hasTitle: !!sample.title,
                    hasSummary: !!sample.summary,
                    hasContent: !!sample.content,
                    hasDifficulty: !!sample.difficulty,
                    sample: {
                        id: sample.id,
                        categoryId: sample.categoryId,
                        title: sample.title
                    }
                }
            );
        }
        
        console.log('=== 完整数据 ===');
        console.log('categories:', window.categories);
        console.log('knowledgeData:', window.knowledgeData);
    </script>
</body>
</html>
