<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Cards 简单测试</title>
    <link rel="stylesheet" href="css/visual-cards.css">
    <style>
        body {
            font-family: -apple-system, sans-serif;
            padding: 40px;
            background: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        #test-result {
            margin: 20px 0;
            padding: 20px;
            background: #e0f7fa;
            border-radius: 8px;
        }
        #test-result.error {
            background: #ffebee;
            color: #c62828;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Visual Cards 简单测试</h1>
        <div id="test-result"></div>
        
        <div id="demo-output"></div>
    </div>
    
    <script src="js/visual-cards.js"></script>
    <script>
        // 测试结果
        const testResult = document.getElementById('test-result');
        
        // 检查 VisualCards 是否存在
        if (typeof VisualCards === 'undefined') {
            testResult.textContent = '错误: VisualCards 未定义！';
            testResult.classList.add('error');
        } else {
            testResult.textContent = '✓ VisualCards 已加载，可用函数: ' + Object.keys(VisualCards).join(', ');
            
            // 测试创建卡片
            const demoOutput = document.getElementById('demo-output');
            
            try {
                // 测试架构图卡片
                demoOutput.innerHTML = VisualCards.createArchitectureCard({
                    title: '测试架构图',
                    layers: ['frontend', 'backend', 'database']
                });
                testResult.textContent += '\n✓ 架构图卡片创建成功！';
            } catch (e) {
                testResult.textContent += '\n✗ 架构图卡片创建失败: ' + e.message;
                testResult.classList.add('error');
            }
        }
    </script>
</body>
</html>
